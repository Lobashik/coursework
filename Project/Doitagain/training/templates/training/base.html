{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link type="text/css" href="{% static 'training/css/styles.css' %}" rel="stylesheet" />
    <title>{{title}}</title>
</head>
<body>
    {% block mainmenu %}
    <h1>{{title}}</h1>
    <ul>
        {% for i in menu %}
        <li><a href="{% url i.url_name %}">{{i.title}}</a></li>
        {% endfor %}
    </ul>
    {% endblock mainmenu %}
    {% block content %}
    {% endblock content %}
</body>
</html>
