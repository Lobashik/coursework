{% extends 'training/base.html' %}

{% block content %}
<h2>Предлагаемые упражнения:</h2>
<ul>
    {% for j in exercises %}
    <li>
        <h2><a href="{{ j.get_absolute_urls }}">{{j.title}}</a></h2>
        <p>{{j.description|linebreaks}}</p>
        <hr>
    </li>
    {% endfor %}
</ul>
<p>Спасибо, что выбрали нас)</p>
{% endblock content %}
